name: ${COMPOSE_PROJECT_NAME:-plmmsa}

networks:
  plmmsa_net:
    driver: bridge

services:
  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    ports:
      - "${API_HOST_PORT:-8080}:8080"
    environment:
      PLMMSA_SETTINGS_FILE: /app/settings.toml
      EMBEDDING_URL: http://embedding:8081
      VDB_URL: http://vdb:8082
      ALIGN_URL: http://align:8083
      # Operational Redis (jobs + tokens + rate limits).
      CACHE_URL: redis://cache-ops:6379
      ADMIN_TOKEN: ${ADMIN_TOKEN:-change-me}
    volumes:
      - ./settings.toml:/app/settings.toml:ro
    depends_on:
      cache-ops:
        condition: service_healthy
      embedding:
        condition: service_healthy
      vdb:
        condition: service_healthy
      align:
        condition: service_healthy
    networks: [plmmsa_net]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s
    restart: unless-stopped

  embedding:
    build:
      context: .
      dockerfile: services/embedding/Dockerfile
    environment:
      PLMMSA_SETTINGS_FILE: /app/settings.toml
      MODEL_CACHE_DIR: /model_cache
      # Point HuggingFace at the shared model cache so PLM weights persist on
      # the host and are shareable across machines. Pre-warm with
      #   HF_HOME=/path/to/host/model_cache huggingface-cli download <repo>
      HF_HOME: /model_cache
      HF_HUB_OFFLINE: ${HF_HUB_OFFLINE:-0}
      ANKH_CL_DEVICE: ${ANKH_CL_DEVICE:-cuda:0}
      ANKH_LARGE_DEVICE: ${ANKH_LARGE_DEVICE:-cuda:0}
      ESM1B_DEVICE: ${ESM1B_DEVICE:-cuda:1}
      PROTTRANS_DEVICE: ${PROTTRANS_DEVICE:-cuda:2}
      ANKH_CL_CHECKPOINT: ${ANKH_CL_CHECKPOINT:-}
      # PyTorch caching allocator — expandable segments give freed memory
      # back to the driver more aggressively. Critical when this container
      # shares a GPU with unrelated workloads; keeps resident VRAM from
      # stacking up across requests. Recommended by the CUDA OOM error
      # itself ("try setting expandable_segments:True to avoid fragmentation").
      PYTORCH_CUDA_ALLOC_CONF: ${PYTORCH_CUDA_ALLOC_CONF:-expandable_segments:True}
      # Embedding result cache (optional — if unset, every request re-encodes).
      # Keyed by sha256(model, sequence); see src/plmmsa/embedding/server.py.
      # PLMMSA_EMBEDDING_CACHE_URL: ${PLMMSA_EMBEDDING_CACHE_URL:-redis://cache-emb:6379}
      # PLMMSA_EMBEDDING_CACHE_TTL_S: ${PLMMSA_EMBEDDING_CACHE_TTL_S:-2592000}
      # Optional Redis-backed shard path index. When set, `/embed_by_id/bin`
      # resolves filename → folder via MGET instead of the /gpfs-hosted
      # sqlite `index.db`. ~300x faster on cold cache. Populate once via
      # `python -m plmmsa.tools.build_shard_index`. Unset = keep sqlite.
      PLMMSA_SHARD_INDEX_REDIS_URL: ${PLMMSA_SHARD_INDEX_REDIS_URL:-redis://cache-seq:6379/0}
    volumes:
      - ./settings.toml:/app/settings.toml:ro
      # Read-write: the embedding container writes first-download artifacts
      # here if HF_HUB_OFFLINE=0. Flip to :ro after the cache is warm on a
      # locked-down deployment.
      - ${MODEL_CACHE_DIR:-./model_cache}:/model_cache
      # Precomputed ProtT5 shard store (optional). When
      # PLMMSA_PROTT5_SHARD_ROOT resolves to a real path, the embedding
      # container serves per-residue embeddings for those UniRef50 ids
      # via POST /embed_by_id instead of running ProtT5 on the GPU.
      # If the env var is unset, the fallback bind source `/dev/null`
      # makes compose start cleanly; the ShardStore constructor logs a
      # WARN and the endpoint 400s for model=prott5.
      - ${PLMMSA_PROTT5_SHARD_ROOT:-/dev/null}:/shards/uniref50_t5/datasets:ro
    # depends_on:
    #   cache-emb:
    #     condition: service_healthy
    networks: [plmmsa_net]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 5m
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
              device_ids: ["0", "1"]
    restart: unless-stopped

  vdb:
    build:
      context: .
      dockerfile: services/vdb/Dockerfile
    environment:
      PLMMSA_SETTINGS_FILE: /app/settings.toml
      VDB_DATA_DIR: /vdb_data
      # vdb itself has no Redis usage yet; placeholder for future shard/meta
      # lookups if we bring the legacy Redis metadb into the service.
      CACHE_URL: redis://cache-ops:6379
    volumes:
      - ./settings.toml:/app/settings.toml:ro
      - ${VDB_DATA_DIR:-./vdb_data}:/vdb_data:ro
    depends_on:
      cache-ops:
        condition: service_healthy
    networks: [plmmsa_net]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8082/health"]
      interval: 10s
      timeout: 3s
      retries: 60
      start_period: 10m
    restart: unless-stopped

  align:
    build:
      context: .
      dockerfile: services/align/Dockerfile
    environment:
      PLMMSA_SETTINGS_FILE: /app/settings.toml
      # OTalign's Sinkhorn + cost matrix run on the same device that
      # produced the embeddings (Ankh-Large by default). We propagate
      # the PLM device pins into the align container so OTalign can
      # pick the matching GPU without a P2P copy.
      ANKH_CL_DEVICE: ${ANKH_CL_DEVICE:-cuda:0}
      ANKH_LARGE_DEVICE: ${ANKH_LARGE_DEVICE:-cuda:0}
      ESM1B_DEVICE: ${ESM1B_DEVICE:-cuda:1}
      PROTTRANS_DEVICE: ${PROTTRANS_DEVICE:-cuda:1}
      PYTORCH_CUDA_ALLOC_CONF: ${PYTORCH_CUDA_ALLOC_CONF:-expandable_segments:True}
      PLMMSA_ALIGN_CUDA_EMPTY_CACHE_AFTER_REQUEST: ${PLMMSA_ALIGN_CUDA_EMPTY_CACHE_AFTER_REQUEST:-0}
      # Number of uvicorn worker processes. Each is a separate ASGI
      # process sharing port 8083, so concurrent /align/bin requests
      # from the worker fanout don't serialize on one event loop.
      PLMMSA_ALIGN_UVICORN_WORKERS: ${PLMMSA_ALIGN_UVICORN_WORKERS:-4}
    volumes:
      - ./settings.toml:/app/settings.toml:ro
    networks: [plmmsa_net]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8083/health"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s
    # GPU reservation lets OTalign move Sinkhorn + cost matrix onto
    # CUDA. Align is otherwise small; the GPU is idle when OTalign
    # isn't the requested aligner.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
              count: all
    restart: unless-stopped

  # Three dedicated Redis instances, split by role so eviction policies,
  # restart times, and persistence cadences can be tuned independently.
  # Persistence dirs are host-controlled via `.env`; see docs/maintenance.md.

  # Operational store: job queue + records, admin tokens, rate-limit counters.
  # Small working set, crash-safety matters → AOF on, no RDB, noeviction.
  cache-ops:
    image: redis:7.4-alpine
    command: >
      redis-server
      --appendonly yes
      --save ""
      --maxmemory-policy noeviction
    volumes:
      - ${CACHE_OPS_DATA_DIR:-./cache_ops_data}:/data
    networks: [plmmsa_net]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 2s
      retries: 5
    restart: unless-stopped

  # Sequence + taxonomy store: UniRef50 `seq:*` and `tax:*` lookups, plus any
  # future corpus/id maps. Big, read-mostly, rebuildable from source FASTAs →
  # RDB only, no AOF, noeviction by default (cap with --maxmemory if needed).
  cache-seq:
    image: redis:7.4-alpine
    command: >
      redis-server
      --appendonly no
      --save "3600 1 600 10000 60 1000000"
      --maxmemory-policy ${CACHE_SEQ_POLICY:-noeviction}
    volumes:
      - ${CACHE_SEQ_DATA_DIR:-./cache_seq_data}:/data
    networks: [plmmsa_net]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 2s
      retries: 5
    restart: unless-stopped

  # Embedding cache: PLM-level per-residue / pooled embedding results.
  # Hot, rebuildable (just re-embed) → RDB snapshots + LRU eviction, capped.
  cache-emb:
    image: redis:7.4-alpine
    command: >
      redis-server
      --appendonly no
      --save "3600 1 600 10000"
      --maxmemory ${CACHE_EMB_MAXMEMORY:-0}
      --maxmemory-policy ${CACHE_EMB_POLICY:-allkeys-lru}
    volumes:
      - ${CACHE_EMB_DATA_DIR:-./cache_emb_data}:/data
    networks: [plmmsa_net]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 2s
      retries: 5
    restart: unless-stopped

  # Public edge. Off by default; opt in with `docker compose --profile tunnel up`.
  # See docs/cloudflare-tunnel.md for the setup walkthrough.
  cloudflared:
    image: cloudflare/cloudflared:latest
    profiles: [tunnel]
    command: tunnel --no-autoupdate run
    # CLOUDFLARE_TUNNEL_TOKEN is required at runtime when this service starts.
    # (We don't use ${VAR:?...} here because that trips compose config parsing
    # even when the profile is not active.)
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:-}
    depends_on:
      api:
        condition: service_healthy
    networks: [plmmsa_net]
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: services/worker/Dockerfile
    environment:
      PLMMSA_SETTINGS_FILE: /app/settings.toml
      # Worker reads jobs from cache-ops and fetches sequences / tax / embed
      # hits from cache-seq / cache-emb. Separate URLs per role.
      CACHE_URL: redis://cache-ops:6379
      EMBEDDING_URL: http://embedding:8081
      VDB_URL: http://vdb:8082
      ALIGN_URL: http://align:8083
      # Sequence + tax lookups.
      PLMMSA_SEQUENCE_REDIS_URL: ${PLMMSA_SEQUENCE_REDIS_URL:-redis://cache-seq:6379}
      PLMMSA_SEQUENCE_KEY_FORMAT: ${PLMMSA_SEQUENCE_KEY_FORMAT:-seq:{id}}
      PLMMSA_TAX_KEY_FORMAT: ${PLMMSA_TAX_KEY_FORMAT:-tax:{id}}
      # Embedding result cache.
      PLMMSA_EMB_REDIS_URL: ${PLMMSA_EMB_REDIS_URL:-redis://cache-emb:6379}
      # Comma-separated PLM ids whose target embeddings the orchestrator
      # should fetch via /embed_by_id (shard store) before falling back to
      # /embed. Empty / unset = today's behavior (every target re-embedded).
      PLMMSA_SHARD_MODELS: ${PLMMSA_SHARD_MODELS:-}
    volumes:
      - ./settings.toml:/app/settings.toml:ro
    depends_on:
      cache-ops:
        condition: service_healthy
      cache-seq:
        condition: service_healthy
      cache-emb:
        condition: service_healthy
      embedding:
        condition: service_healthy
      vdb:
        condition: service_healthy
      align:
        condition: service_healthy
    networks: [plmmsa_net]
    restart: unless-stopped
